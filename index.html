<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Project Phase Tracker</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="top-bar">
        <div class="top-bar__left">
          <button id="btnSettings" class="icon-button" aria-label="Toggle navigation rail" aria-pressed="false">
            <svg
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
              aria-hidden="true"
            >
              <path
                d="M12 15.5C13.933 15.5 15.5 13.933 15.5 12C15.5 10.067 13.933 8.5 12 8.5C10.067 8.5 8.5 10.067 8.5 12C8.5 13.933 10.067 15.5 12 15.5Z"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
              <path
                d="M19.4 13.5C19.6 13 20 12.5 20 12C20 11.5 19.6 11 19.4 10.5L21 8.2C21.1 8 21.1 7.7 20.9 7.5L18.5 5.5C18.3 5.3 18 5.3 17.8 5.4L15.5 6.4C15 6 14.5 5.6 14 5.3L13.6 3C13.5 2.8 13.2 2.7 13 2.7H11C10.8 2.7 10.5 2.8 10.4 3L10 5.3C9.5 5.6 9 6 8.5 6.4L6.2 5.4C6 5.3 5.7 5.3 5.5 5.5L3.1 7.5C2.9 7.7 2.9 8 3 8.2L4.6 10.5C4.4 11 4 11.5 4 12C4 12.5 4.4 13 4.6 13.5L3 15.8C2.9 16 2.9 16.3 3.1 16.5L5.5 18.5C5.7 18.7 6 18.7 6.2 18.6L8.5 17.6C9 18 9.5 18.4 10 18.7L10.4 21C10.5 21.2 10.8 21.3 11 21.3H13C13.2 21.3 13.5 21.2 13.6 21L14 18.7C14.5 18.4 15 18 15.5 17.6L17.8 18.6C18 18.7 18.3 18.7 18.5 18.5L20.9 16.5C21.1 16.3 21.1 16 21 15.8L19.4 13.5Z"
                stroke="currentColor"
                stroke-width="1.5"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
          </button>
        </div>
        <div class="top-bar__right">
          <div class="capacity-panel">
            <span id="capacityIndicator" class="capacity-indicator" aria-live="polite">0 / 16</span>
            <span
              id="capacityFeedback"
              class="capacity-feedback"
              role="status"
              aria-live="assertive"
              hidden
            ></span>
          </div>
          <button id="btnCreate" class="fab-button" aria-label="Create new project">
            +
          </button>
        </div>
      </header>

          <main class="main-content" data-view="dashboard" data-rail-open="false">
        <div class="canvas-shell">
          <aside class="left-rail" aria-label="View navigation rail">
            <nav class="left-rail__nav" role="tablist">
              <button
                type="button"
                class="left-rail__item is-active"
                data-view-option="dashboard"
                aria-current="page"
              >
                Dashboard
              </button>
              <button
                type="button"
                class="left-rail__item"
                data-view-option="completed"
                aria-current="false"
              >
                Completed
              </button>
              <button
                type="button"
                class="left-rail__item"
                data-view-option="abandoned"
                aria-current="false"
              >
                Abandoned
              </button>
            </nav>
          </aside>

          <div class="canvas-center">
            <section class="workspace">
              <div id="projectsGrid" class="grid-shell" aria-label="Projects grid"></div>
              <div id="emptyState" class="empty-state">
                <p class="empty-state__label">No projects yet</p>
                <p class="empty-state__hint">
                  Start a new project to see your roadmap take shape.
                </p>
              </div>
            </section>
          </div>

          <aside class="right-inspector" aria-label="Project inspector">
            <div class="right-inspector__shell">
              <header class="right-inspector__header">
                <input
                  id="inspectorName"
                  class="right-inspector__title-input"
                  type="text"
                  placeholder="Project name"
                  aria-label="Project name"
                />
                <button id="inspectorClose" class="icon-button right-inspector__close" aria-label="Close inspector">
                  ×
                </button>
              </header>
              <div class="right-inspector__body">
                <section class="inspector-section">
                  <p class="inspector-section__title">Properties</p>
                  <label class="inspector-field">
                    <span>Owner</span>
                    <input id="inspectorOwner" type="text" placeholder="Owner name" />
                  </label>
                  <label class="inspector-field">
                    <span>Phase</span>
                    <select id="inspectorPhase">
                      <option value="Idea">Idea</option>
                      <option value="Build">Build</option>
                      <option value="Fix">Fix</option>
                      <option value="Done">Done</option>
                    </select>
                  </label>
                  <label class="inspector-field">
                    <span>Due date</span>
                    <div class="inspector-date-row">
                      <input id="inspectorDueDate" type="date" />
                      <button id="inspectorClearDueDate" type="button">Clear</button>
                    </div>
                  </label>
                </section>
                <section class="inspector-section">
                  <p class="inspector-section__title">Notes</p>
                  <div class="notes-tablist" role="tablist">
                    <button type="button" class="notes-tab" data-notes-phase="Idea">Idea</button>
                    <button type="button" class="notes-tab" data-notes-phase="Build">Build</button>
                    <button type="button" class="notes-tab" data-notes-phase="Fix">Fix</button>
                    <button type="button" class="notes-tab" data-notes-phase="Done">Done</button>
                  </div>
                  <textarea id="inspectorNotes" placeholder="Enter phase specific notes"></textarea>
                </section>
                <section class="inspector-section inspector-history">
                  <p class="inspector-section__title">Phase history</p>
                  <ul id="inspectorHistoryList" class="inspector-history__list"></ul>
                </section>
                <section class="inspector-section inspector-meta">
                  <p class="inspector-section__title">Metadata</p>
                  <div class="inspector-meta__row">
                    <span>Created</span>
                    <span id="inspectorCreated"></span>
                  </div>
                  <div class="inspector-meta__row">
                    <span>Updated</span>
                    <span id="inspectorUpdated"></span>
                  </div>
                </section>
                <div class="inspector-footer">
                  <button id="inspectorAbandon" class="inspector-footer__button inspector-footer__button--danger">
                    Abandon project
                  </button>
                  <div class="inspector-footer__confirmation" id="inspectorAbandonConfirm">
                    Click again or press Ctrl+Enter to confirm
                  </div>
                </div>
              </div>
            </div>
          </aside>
        </div>
      </main>
    </div>
    <script src="app.js"></script>
  </body>
</html>
